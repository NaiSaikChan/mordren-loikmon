<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loikmon — Mon Digital Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@100..900&family=Noto+Serif+Myanmar:wght@100..900&display=swap" rel="stylesheet">
    <script>
      // Prevent FOUC: apply dark mode + font settings before Vue mounts
      ;(function () {
        var theme = localStorage.getItem('theme')
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        }
        var bodyFont = localStorage.getItem('ui-body-font')
        var headerFont = localStorage.getItem('ui-header-font')
        var bodySize = localStorage.getItem('ui-body-font-size')
        var headerScale = localStorage.getItem('ui-header-scale')
        var sizes = { xs: '13px', sm: '14px', md: '16px', lg: '18px', xl: '20px' }
        var scales = { sm: '0.85', md: '1', lg: '1.15', xl: '1.3' }
        var root = document.documentElement
        if (bodyFont) root.style.setProperty('--ui-body-font', "'" + bodyFont + "', system-ui, sans-serif")
        if (headerFont) root.style.setProperty('--ui-header-font', "'" + headerFont + "', system-ui, sans-serif")
        if (bodySize && sizes[bodySize]) root.style.fontSize = sizes[bodySize]
        if (headerScale && scales[headerScale]) root.style.setProperty('--ui-header-scale', scales[headerScale])
      })()
    </script>
  </head>
  <body class="h-full">
    <div id="app" class="h-full"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
